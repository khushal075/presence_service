version : '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: presence_redis
    ports:
      - "6379:6379"

  app-1:
    build: .
    container_name: presence_app_1
    ports:
      - "8001:8001"
    environment:
      REDIS_URL: redis://redis:6789
    depends_on:
      - redis

  app-2:
    build: .
    container_name: presence_app_2
    ports:
      - '8002:8002'
    environment:
      REDIS_URL: redis://redis:6789
    depends_on:
      - redis
